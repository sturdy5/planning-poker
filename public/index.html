<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planning Poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0c0c0e;
  --ink-2:     #18181c;
  --ink-3:     #222228;
  --rule:      #2c2c35;
  --muted:     #55556a;
  --soft:      #888899;
  --body:      #c8c8d8;
  --head:      #ededf5;
  --amber:     #f0a04b;
  --amber-dim: #7a4e1e;
  --green:     #3ecf8e;
  --green-dim: #0e3d28;
  --red:       #f06060;
  --blue:      #60a8f0;
  --r:         10px;
  --r-lg:      16px;
  --shadow:    0 1px 3px rgba(0,0,0,.5), 0 4px 16px rgba(0,0,0,.3);
}

[data-theme="light"] {
  --ink:       #f8f8fc;
  --ink-2:     #f0f0f8;
  --ink-3:     #e6e6f0;
  --rule:      #d8d8e8;
  --muted:     #9090a8;
  --soft:      #6868808;
  --body:      #404058;
  --head:      #18182a;
  --amber:     #d4821a;
  --amber-dim: #fdf3e7;
  --green:     #1a9c64;
  --green-dim: #e6fbf3;
  --red:       #d43030;
  --blue:      #2070c0;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { font-size: 15px; }

body {
  font-family: 'Geist Mono', monospace;
  background: var(--ink);
  color: var(--body);
  min-height: 100dvh;
  transition: background .25s, color .25s;
  -webkit-font-smoothing: antialiased;
}

/* ── Utility ──────────────────────────────────────────────────────────── */
.sr-only { position: absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

/* ── Lobby ───────────────────────────────────────────────────────────── */
#lobby {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.lobby-wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 2.5rem;
}

.wordmark {
  display: flex;
  flex-direction: column;
  gap: .25rem;
}

.wordmark-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.25rem;
  color: var(--head);
  letter-spacing: -.02em;
  line-height: 1;
}

.wordmark-sub {
  font-size: .7rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}

.lobby-form {
  display: flex;
  flex-direction: column;
  gap: .75rem;
}

.field {
  display: flex;
  flex-direction: column;
  gap: .375rem;
}

.field-label {
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}

.field-input {
  background: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: .75rem 1rem;
  font-family: 'Geist Mono', monospace;
  font-size: .875rem;
  color: var(--head);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field-input::placeholder { color: var(--muted); }
.field-input:focus { border-color: var(--amber); }
.field-input.room-input { text-transform: uppercase; letter-spacing: .08em; }

.lobby-actions {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  font-family: 'Geist Mono', monospace;
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .04em;
  border-radius: var(--r);
  padding: .75rem 1.25rem;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-primary {
  background: var(--amber);
  color: #18100a;
  border-color: var(--amber);
}
.btn-primary:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-primary:not(:disabled):active { transform: none; filter: brightness(.95); }

.btn-ghost {
  background: transparent;
  color: var(--soft);
  border-color: var(--rule);
}
.btn-ghost:not(:disabled):hover { border-color: var(--soft); color: var(--head); }

.btn-danger {
  background: transparent;
  color: var(--soft);
  border-color: var(--rule);
}
.btn-danger:not(:disabled):hover { border-color: var(--red); color: var(--red); }

.lobby-or {
  display: flex;
  align-items: center;
  gap: .75rem;
  color: var(--muted);
  font-size: .7rem;
  letter-spacing: .08em;
}
.lobby-or::before, .lobby-or::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

/* ── App shell ───────────────────────────────────────────────────────── */
#app {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--ink);
  border-bottom: 1px solid var(--rule);
  padding: 0 1.5rem;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.topbar-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.15rem;
  color: var(--head);
  letter-spacing: -.01em;
}

.room-pill {
  display: flex;
  align-items: center;
  gap: .5rem;
  background: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: .3rem .75rem;
  font-size: .7rem;
  letter-spacing: .06em;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  color: var(--soft);
}
.room-pill:hover { border-color: var(--amber); color: var(--head); }
.room-pill .room-code { color: var(--amber); font-weight: 600; }

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 2px rgba(62,207,142,.2);
  animation: pulse 2s ease infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(62,207,142,.2); }
  50%      { box-shadow: 0 0 0 5px rgba(62,207,142,.0); }
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: .75rem;
}

/* Theme switch */
.theme-switch {
  display: flex;
  align-items: center;
  gap: .5rem;
  cursor: pointer;
  user-select: none;
}
.theme-switch-track {
  width: 36px; height: 20px;
  background: var(--ink-3);
  border: 1px solid var(--rule);
  border-radius: 999px;
  position: relative;
  transition: background .2s;
}
.theme-switch-track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform .2s, background .2s;
}
[data-theme="light"] .theme-switch-track { background: var(--amber-dim); border-color: var(--amber); }
[data-theme="light"] .theme-switch-track::after { transform: translateX(16px); background: var(--amber); }
.theme-switch-label { font-size: .65rem; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }

/* ── Main layout ─────────────────────────────────────────────────────── */
.app-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 0;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  padding: 2rem 1.5rem;
  gap: 2rem;
  align-items: start;
}

@media (max-width: 780px) {
  .app-body { grid-template-columns: 1fr; }
  .sidebar { order: -1; }
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.panel {
  background: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.panel-head {
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--rule);
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-body { padding: .75rem; }

/* Players */
.player-list {
  display: flex;
  flex-direction: column;
  gap: .375rem;
}

.player-row {
  display: flex;
  align-items: center;
  gap: .625rem;
  padding: .5rem .625rem;
  border-radius: 8px;
  transition: background .15s;
  animation: rowIn .25s ease;
}
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}

.player-avatar {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}

.player-name {
  flex: 1;
  font-size: .8rem;
  color: var(--body);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.player-name .you-tag {
  color: var(--muted);
  font-size: .65rem;
  margin-left: .3rem;
}

.player-status {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-pending { color: var(--rule); }
.status-voted   { color: var(--amber); }
.status-val     {
  font-family: 'Instrument Serif', serif;
  font-size: 1rem;
  color: var(--green);
  line-height: 1;
}

/* Activity log */
.log-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--rule) transparent;
}

.log-item {
  display: flex;
  gap: .625rem;
  padding: .375rem .25rem;
  border-bottom: 1px solid var(--rule);
  animation: logIn .2s ease;
}
.log-item:last-child { border-bottom: none; }
@keyframes logIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.log-time {
  font-size: .65rem;
  color: var(--muted);
  flex-shrink: 0;
  padding-top: .05rem;
  font-variant-numeric: tabular-nums;
}
.log-text { font-size: .72rem; color: var(--soft); line-height: 1.5; }
.log-text b { color: var(--body); font-weight: 500; }
.log-text .log-accent { color: var(--amber); }
.log-text .log-green  { color: var(--green); }
.log-text .log-red    { color: var(--red); }

/* ── Main column ─────────────────────────────────────────────────────── */
.main-col {
  display: flex;
  flex-direction: column;
  gap: 1.75rem;
}

/* Result banners */
.result-banner {
  border-radius: var(--r-lg);
  border: 1px solid var(--rule);
  padding: 1.25rem 1.5rem;
  display: none;
  animation: bannerIn .35s cubic-bezier(.22,.68,0,1.2);
}
@keyframes bannerIn {
  from { opacity: 0; transform: translateY(-8px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Winner banner */
#banner-win {
  background: var(--green-dim);
  border-color: color-mix(in srgb, var(--green) 30%, transparent);
  align-items: center;
  gap: 1.5rem;
}
[data-theme="light"] #banner-win { background: var(--green-dim); }

.win-number {
  font-family: 'Instrument Serif', serif;
  font-size: 4rem;
  color: var(--green);
  line-height: 1;
  flex-shrink: 0;
}

.win-meta { display: flex; flex-direction: column; gap: .3rem; }
.win-label {
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--green);
  opacity: .7;
}
.win-detail { font-size: .8rem; color: var(--soft); }
.win-detail b { color: var(--body); font-weight: 500; }

/* Discussion banner */
#banner-discuss {
  background: color-mix(in srgb, var(--red) 6%, var(--ink-2));
  border-color: color-mix(in srgb, var(--red) 25%, transparent);
  flex-direction: column;
  gap: 1rem;
}

.discuss-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--red);
}

.discuss-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.outlier-group { display: flex; align-items: center; gap: .625rem; }

.outlier-tag {
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .2rem .55rem;
  border-radius: 6px;
  font-weight: 600;
}
.outlier-tag.low  { background: color-mix(in srgb, var(--blue) 15%, transparent); color: var(--blue); }
.outlier-tag.high { background: color-mix(in srgb, var(--red)  15%, transparent); color: var(--red); }

.outlier-chips { display: flex; gap: .4rem; flex-wrap: wrap; }

.ochip {
  display: flex;
  align-items: center;
  gap: .4rem;
  background: var(--ink-3);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: .3rem .65rem;
  font-size: .75rem;
}
.ochip-val {
  font-family: 'Instrument Serif', serif;
  font-size: .95rem;
  line-height: 1;
}
.ochip.low  .ochip-val { color: var(--blue); }
.ochip.high .ochip-val { color: var(--red); }

.discuss-arrow { color: var(--muted); font-size: .9rem; }

/* ── Vote section ────────────────────────────────────────────────────── */
.vote-section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.section-label {
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

.vote-count-label {
  font-size: .7rem;
  color: var(--muted);
}
.vote-count-label span { color: var(--amber); }

/* Cards grid */
.cards-grid {
  display: flex;
  flex-wrap: wrap;
  gap: .625rem;
}

/* ── The card ────────────────────────────────────────────────────────── */
.card-wrap {
  perspective: 600px;
}

.card {
  width: 68px;
  height: 96px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .08s ease, box-shadow .08s ease;
  cursor: pointer;
  border-radius: var(--r);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border: 1.5px solid var(--rule);
}

.card-front {
  background: var(--ink-2);
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  color: var(--head);
  transition: background .15s, border-color .15s;
}

.card-back {
  background: var(--ink-3);
  transform: rotateY(180deg);
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 4px,
    rgba(255,255,255,.015) 4px,
    rgba(255,255,255,.015) 8px
  );
}

/* hover */
.card:hover .card-front {
  background: var(--ink-3);
  border-color: var(--amber);
}
.card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,.4); }

/* selected */
.card.selected .card-front {
  background: color-mix(in srgb, var(--amber) 12%, var(--ink-2));
  border-color: var(--amber);
  color: var(--amber);
}
.card.selected { transform: translateY(-10px); box-shadow: 0 16px 40px rgba(240,160,75,.1); }

/* ── Actions bar ─────────────────────────────────────────────────────── */
.actions-bar {
  display: flex;
  gap: .625rem;
  flex-wrap: wrap;
}

/* ── Toasts ──────────────────────────────────────────────────────────── */
#toasts {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: .4rem;
  align-items: center;
  z-index: 999;
  pointer-events: none;
}

.toast {
  background: var(--head);
  color: var(--ink);
  border-radius: 8px;
  padding: .55rem 1rem;
  font-size: .75rem;
  font-weight: 500;
  white-space: nowrap;
  box-shadow: var(--shadow);
  animation: tIn .2s ease, tOut .2s ease 2.6s forwards;
}
@keyframes tIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
@keyframes tOut { to   { opacity:0; transform:translateY(-4px); } }

/* ── Player flash (post-reveal vote change) ───────────────────────────── */
@keyframes playerFlash {
  0%   { background: transparent; transform: translateX(0); }
  15%  { background: color-mix(in srgb, var(--amber) 18%, transparent); transform: translateX(-4px); }
  30%  { background: color-mix(in srgb, var(--amber) 12%, transparent); transform: translateX(3px); }
  50%  { background: color-mix(in srgb, var(--amber) 10%, transparent); transform: translateX(-2px); }
  70%  { background: color-mix(in srgb, var(--amber) 6%, transparent);  transform: translateX(1px); }
  100% { background: transparent; transform: translateX(0); }
}

.player-row.flashing {
  animation: playerFlash .55s ease forwards;
}

.edited-badge {
  font-size: .58rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--amber);
  border: 1px solid color-mix(in srgb, var(--amber) 40%, transparent);
  border-radius: 4px;
  padding: .1rem .35rem;
  animation: badgeFade 2s ease forwards;
  flex-shrink: 0;
}
@keyframes badgeFade {
  0%   { opacity: 1; }
  60%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Confetti ─────────────────────────────────────────────────────────── */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 1;
}
@media (max-width: 520px) {
  .card { width: 58px; height: 82px; }
  .card-front { font-size: 1.3rem; }
  .topbar { padding: 0 1rem; }
  .app-body { padding: 1rem; }
}
</style>
</head>
<body>

<!-- ── LOBBY ──────────────────────────────────────────────────────────────── -->
<div id="lobby">
  <div class="lobby-wrap">
    <div class="wordmark">
      <div class="wordmark-title">Planning Poker</div>
    </div>

    <div class="lobby-form">
      <div class="field">
        <label class="field-label" for="inp-name">Nickname</label>
        <input id="inp-name" class="field-input" type="text" placeholder="e.g. whatamidoinghere" maxlength="24" autocomplete="off"/>
      </div>

      <div class="field">
        <label class="field-label" for="inp-room">
          Room code <span style="color:var(--muted);font-size:.6rem;letter-spacing:.04em;text-transform:none">— leave blank to create</span>
        </label>
        <input id="inp-room" class="field-input room-input" type="text" placeholder="e.g. OCP123" maxlength="16" autocomplete="off"/>
      </div>
    </div>

    <div class="lobby-actions">
      <button class="btn btn-primary" onclick="joinRoom()">
        Enter room
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────────── -->
<div id="app">

  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Planning Poker</div>
      <div class="room-pill" onclick="copyRoom()" title="Click to copy">
        <div class="live-dot"></div>
        <span>Room&nbsp;</span><span class="room-code" id="disp-room">—</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </div>
    </div>
    <div class="topbar-right">
      <div class="theme-switch" onclick="toggleTheme()" title="Toggle theme">
        <div class="theme-switch-track"></div>
        <span class="theme-switch-label" id="theme-lbl">Dark</span>
      </div>
    </div>
  </header>

  <div class="app-body">

    <!-- Main column -->
    <div class="main-col">

      <!-- Result banners -->
      <div id="banner-win" class="result-banner" style="display:none">
        <div class="win-number" id="win-num">—</div>
        <div class="win-meta">
          <div class="win-label">Points awarded</div>
          <div class="win-detail" id="win-detail"></div>
        </div>
      </div>

      <div id="banner-discuss" class="result-banner" style="display:none">
        <div class="discuss-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Needs discussion
        </div>
        <div class="discuss-row">
          <div class="outlier-group" id="og-low">
            <span class="outlier-tag low">Low</span>
            <div class="outlier-chips" id="oc-low"></div>
          </div>
          <span class="discuss-arrow" id="discuss-arrow">↔</span>
          <div class="outlier-group" id="og-high">
            <span class="outlier-tag high">High</span>
            <div class="outlier-chips" id="oc-high"></div>
          </div>
        </div>
      </div>

      <!-- Cards -->
      <section>
        <div class="vote-section-head">
          <span class="section-label">Your estimate</span>
          <span class="vote-count-label" id="vote-count-lbl"></span>
        </div>
        <div class="cards-grid" id="cards-grid"></div>
      </section>

      <!-- Actions -->
      <div class="actions-bar">
        <button class="btn btn-primary" id="btn-reveal" onclick="reveal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Reveal cards
        </button>
        <button class="btn btn-ghost" onclick="newRound()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.17"/></svg>
          New round
        </button>
      </div>

    </div><!-- /main-col -->

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="panel">
        <div class="panel-head">
          <span>Participants</span>
          <span id="pc-label" style="color:var(--amber)">0</span>
        </div>
        <div class="panel-body">
          <div class="player-list" id="player-list"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">Activity</div>
        <div class="panel-body" style="padding:.5rem .75rem">
          <div class="log-list" id="log-list">
            <div class="log-item">
              <span class="log-time">—</span>
              <span class="log-text">Waiting for activity…</span>
            </div>
          </div>
        </div>
      </div>

    </aside>

  </div><!-- /app-body -->
</div><!-- /app -->

<canvas id="confetti-canvas"></canvas>

<div id="toasts"></div>

<script>
// ── Constants ───────────────────────────────────────────────────────────────
const FIB       = [1, 2, 3, 5, 8, 13, 21, '?'];
const FIB_NUM   = [1, 2, 3, 5, 8, 13, 21];
const COLORS    = ['#f0a04b','#3ecf8e','#60a8f0','#e879f9','#fb7185','#34d399','#fbbf24','#a78bfa'];

// ── State ───────────────────────────────────────────────────────────────────
let ws, myId, myRoom, myVote = null;
let state = { revealed: false, users: [] };
let initialRevealDone = false; // confetti guard

// ── Theme ───────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  document.documentElement.dataset.theme = isLight ? 'dark' : 'light';
  document.getElementById('theme-lbl').textContent = isLight ? 'Dark' : 'Light';
}

// ── Lobby ───────────────────────────────────────────────────────────────────
document.getElementById('inp-name').addEventListener('keydown', e => e.key === 'Enter' && document.getElementById('inp-room').focus());
document.getElementById('inp-room').addEventListener('keydown', e => e.key === 'Enter' && joinRoom());

// Auto-fill room code from ?roomCode= URL param
const _urlRoom = new URLSearchParams(location.search).get('roomCode');
if (_urlRoom) {
  document.getElementById('inp-room').value = _urlRoom.toUpperCase();
  document.getElementById('inp-name').focus();
}

function joinRoom() {
  const name = document.getElementById('inp-name').value.trim();
  const room = document.getElementById('inp-room').value.trim().toUpperCase() || null;
  if (!name) { toast('Enter your name first'); document.getElementById('inp-name').focus(); return; }
  connect(name, room);
}

// ── WebSocket ───────────────────────────────────────────────────────────────
function connect(name, roomId) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', payload: { name, roomId } }));
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose   = () => { toast('Disconnected'); log('<span class="log-red">Connection lost</span>'); };
  ws.onerror   = () => toast('Connection error');
}

function send(type, payload = {}) {
  if (ws?.readyState === 1) ws.send(JSON.stringify({ type, payload }));
}

// ── Message handler ─────────────────────────────────────────────────────────
function handle({ type, payload }) {
  switch (type) {

    case 'welcome':
      myId   = payload.userId;
      myRoom = payload.roomId;
      state  = payload.state;
      document.getElementById('disp-room').textContent = myRoom;
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('app').style.display   = 'flex';
      buildCards();
      render();
      log(`Joined room <span class="log-accent">${myRoom}</span>`);
      break;

    case 'user_joined':
      state = payload.state;
      render();
      log(`<b>${esc(nameOf(payload.userId, payload.name))}</b> joined`);
      break;

    case 'user_left':
      state = payload.state;
      render();
      log(`<b>${esc(payload.name)}</b> <span class="log-red">left</span>`);
      break;

    case 'vote_cast':
      state = payload.state;
      render();
      if (payload.userId !== myId)
        log(`<b>${esc(nameOf(payload.userId))}</b> picked a card`);
      break;

    case 'vote_updated':
      state = payload.state;
      render();
      if (state.revealed) {
        evalConsensus(false); // never confetti on post-reveal changes
        flashPlayer(payload.userId);
      }
      if (payload.userId !== myId)
        log(`<b>${esc(nameOf(payload.userId))}</b> changed vote`);
      break;

    case 'revealed':
      state = payload.state;
      initialRevealDone = false; // about to do the reveal for real
      render();
      evalConsensus(true); // allow confetti only here
      initialRevealDone = true;
      log(`Cards <span class="log-green">revealed</span>`);
      break;

    case 'cleared':
      state    = payload.state;
      myVote   = null;
      initialRevealDone = false;
      render();
      hideBanners();
      log(`<span class="log-accent">New round</span> started`);
      break;
  }
}

// ── Build cards ─────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  FIB.forEach(val => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.val = val;
    card.innerHTML = `
      <div class="card-face card-front">${val}</div>
      <div class="card-face card-back"></div>
    `;
    card.onclick = () => castVote(val, card);
    wrap.appendChild(card);
    grid.appendChild(wrap);
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderPlayers();
  renderCards();
  renderVoteCount();
  const votedCount = state.users.filter(u => u.hasVote).length;
  document.getElementById('btn-reveal').disabled = state.revealed || votedCount < 2;
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  const existing = {};
  list.querySelectorAll('.player-row').forEach(el => existing[el.dataset.uid] = el);

  const ids = new Set(state.users.map(u => u.id));
  Object.keys(existing).forEach(id => { if (!ids.has(id)) existing[id].remove(); });

  state.users.forEach((user, i) => {
    let row = existing[user.id];
    const color    = COLORS[i % COLORS.length];
    const initials = user.name.slice(0, 2).toUpperCase();

    if (!row) {
      row = document.createElement('div');
      row.className = 'player-row';
      row.dataset.uid = user.id;
      row.innerHTML = `
        <div class="player-avatar" style="background:${color}">${initials}</div>
        <span class="player-name">${esc(user.name)}${user.id === myId ? '<span class="you-tag">you</span>' : ''}</span>
        <div class="player-status"></div>
      `;
      list.appendChild(row);
    }

    const st = row.querySelector('.player-status');
    if (state.revealed && user.vote !== null) {
      st.innerHTML = `<span class="status-val">${esc(String(user.vote))}</span>`;
    } else if (user.hasVote) {
      st.innerHTML = `<svg class="status-voted" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>`;
    } else {
      st.innerHTML = `<svg class="status-pending" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`;
    }
  });

  document.getElementById('pc-label').textContent = state.users.length;
}

function renderCards() {
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('selected', String(card.dataset.val) === String(myVote));
  });
}

function renderVoteCount() {
  const voted = state.users.filter(u => u.hasVote).length;
  const total = state.users.length;
  const lbl   = document.getElementById('vote-count-lbl');
  lbl.innerHTML = voted === total && total > 0
    ? `<span style="color:var(--green)">${voted}/${total} voted</span>`
    : `<span>${voted}</span>/<span>${total}</span> voted`;
}

// ── Consensus logic ──────────────────────────────────────────────────────────
function evalConsensus(allowConfetti = false) {
  const votes    = state.users.map(u => u.vote).filter(v => v !== null);
  const numVotes = votes.filter(v => v !== '?' && v !== '∞').map(Number);

  if (numVotes.length < 2) { hideBanners(); return; }

  const idxOf   = v => FIB_NUM.indexOf(v);
  const indices = numVotes.map(idxOf).filter(i => i >= 0);
  if (indices.length < 2) { hideBanners(); return; }

  const minI = Math.min(...indices);
  const maxI = Math.max(...indices);

  if (maxI - minI <= 1) {
    const unanimous = new Set(numVotes).size === 1;
    showWin(FIB_NUM[maxI], numVotes, unanimous && allowConfetti);
  } else {
    // ❌ Needs discussion
    showDiscuss(FIB_NUM[minI], FIB_NUM[maxI]);
  }
}

function showWin(val, allNums, unanimous) {
  document.getElementById('banner-discuss').style.display = 'none';
  const banner = document.getElementById('banner-win');
  banner.style.display = 'flex';
  document.getElementById('win-num').textContent = val;

  const unique = [...new Set(allNums)].sort((a,b) => a - b);
  const detail = document.getElementById('win-detail');
  if (unanimous) {
    detail.innerHTML = `<span style="color:var(--green)">Unanimous!</span> Everyone voted <b>${unique[0]}</b>`;
    launchConfetti();
  } else {
    detail.innerHTML = unique.length === 1
      ? `All voted <b>${unique[0]}</b>`
      : `Consensus between <b>${unique.join('</b> and <b>')}</b>`;
  }
}

function showDiscuss(lowVal, highVal) {
  document.getElementById('banner-win').style.display = 'none';
  const banner = document.getElementById('banner-discuss');
  banner.style.display = 'flex';

  const lowUsers  = state.users.filter(u => u.vote !== null && Number(u.vote) === lowVal);
  const highUsers = state.users.filter(u => u.vote !== null && Number(u.vote) === highVal);

  document.getElementById('og-low').style.display  = lowUsers.length  ? 'flex' : 'none';
  document.getElementById('og-high').style.display = highUsers.length ? 'flex' : 'none';
  document.getElementById('discuss-arrow').style.display = (lowUsers.length && highUsers.length) ? '' : 'none';

  document.getElementById('oc-low').innerHTML  = lowUsers.map(u =>
    `<div class="ochip low"><span class="ochip-val">${esc(String(u.vote))}</span><span>${esc(u.name)}</span></div>`
  ).join('');
  document.getElementById('oc-high').innerHTML = highUsers.map(u =>
    `<div class="ochip high"><span class="ochip-val">${esc(String(u.vote))}</span><span>${esc(u.name)}</span></div>`
  ).join('');
}

function hideBanners() {
  document.getElementById('banner-win').style.display     = 'none';
  document.getElementById('banner-discuss').style.display = 'none';
}

// ── Flash a player row on post-reveal vote change ────────────────────────────
function flashPlayer(userId) {
  const row = document.querySelector(`.player-row[data-uid="${userId}"]`);
  if (!row) return;

  // Remove any existing flash so re-triggering works
  row.classList.remove('flashing');
  void row.offsetWidth; // reflow to restart animation

  // Remove any stale badge
  row.querySelector('.edited-badge')?.remove();

  // Add shake flash
  row.classList.add('flashing');
  row.addEventListener('animationend', () => row.classList.remove('flashing'), { once: true });

  // Insert amber "edited" badge after the name, before the status
  const badge = document.createElement('span');
  badge.className = 'edited-badge';
  badge.textContent = 'edited';
  const status = row.querySelector('.player-status');
  row.insertBefore(badge, status);

  // Remove badge after animation completes (2s)
  setTimeout(() => badge.remove(), 2100);
}

// ── Actions ──────────────────────────────────────────────────────────────────
function castVote(val) {
  myVote = val;
  renderCards();
  send('vote', { vote: val });
  log(`You voted <span class="log-accent">${val}</span>`);
}

function reveal()   { send('reveal'); }
function newRound() { send('clear'); }

function copyRoom() {
  const url = `${location.origin}${location.pathname}?roomCode=${myRoom}`;
  navigator.clipboard.writeText(url)
    .then(() => toast(`Room link copied`));
}

// ── Activity log ─────────────────────────────────────────────────────────────
function log(html) {
  const list = document.getElementById('log-list');
  // Remove placeholder
  const placeholder = list.querySelector('.log-item:only-child');
  if (placeholder && placeholder.querySelector('.log-time')?.textContent === '—') placeholder.remove();

  const now  = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<span class="log-time">${time}</span><span class="log-text">${html}</span>`;
  list.insertBefore(item, list.firstChild);
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nameOf(uid, fallback = uid) {
  return state.users.find(u => u.id === uid)?.name ?? fallback;
}

// ── Confetti ─────────────────────────────────────────────────────────────────
(function() {
  const canvas  = document.getElementById('confetti-canvas');
  const ctx     = canvas.getContext('2d');
  let particles = [];
  let rafId     = null;
  let fading    = false;
  let globalAlpha = 1;

  const COLORS_CONF = [
    '#f0a04b','#3ecf8e','#60a8f0','#e879f9',
    '#fb7185','#fbbf24','#a78bfa','#34d399','#f472b6'
  ];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function makeParticle() {
    const angle  = randomBetween(-Math.PI * 0.9, -Math.PI * 0.1); // upward arc
    const speed  = randomBetween(8, 22);
    const size   = randomBetween(6, 13);
    const isRect = Math.random() > 0.4;
    return {
      x:      randomBetween(canvas.width * .2, canvas.width * .8),
      y:      canvas.height + 10,
      vx:     Math.cos(angle) * speed,
      vy:     Math.sin(angle) * speed,
      rot:    randomBetween(0, Math.PI * 2),
      rotV:   randomBetween(-0.18, 0.18),
      color:  COLORS_CONF[Math.floor(Math.random() * COLORS_CONF.length)],
      w:      isRect ? size * 1.6 : size,
      h:      isRect ? size * 0.6 : size,
      rect:   isRect,
      gravity: randomBetween(0.25, 0.5),
      drag:   randomBetween(0.97, 0.995),
      wobble: randomBetween(0, Math.PI * 2),
      wobbleV: randomBetween(0.05, 0.15),
    };
  }

  function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = globalAlpha;

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x    += p.vx;
      p.y    += p.vy;
      p.vy   += p.gravity;
      p.vx   *= p.drag;
      p.vy   *= p.drag;
      p.rot  += p.rotV;
      p.wobble += p.wobbleV;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;

      if (p.rect) {
        const scaleY = Math.cos(p.wobble);
        ctx.scale(1, scaleY || 0.01);
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      if (p.y > canvas.height + 40) particles.splice(i, 1);
    }

    if (fading) {
      globalAlpha = Math.max(0, globalAlpha - 0.012);
    }

    if (particles.length > 0 || globalAlpha > 0) {
      rafId = requestAnimationFrame(step);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
      rafId = null;
    }
  }

  window.launchConfetti = function() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    particles    = [];
    globalAlpha  = 1;
    fading       = false;

    // Burst in 3 waves
    const burst = (count, delay) => setTimeout(() => {
      for (let i = 0; i < count; i++) particles.push(makeParticle());
    }, delay);

    burst(80,   0);
    burst(60, 180);
    burst(50, 380);

    // Start fading after 2.4s
    setTimeout(() => { fading = true; }, 2400);

    rafId = requestAnimationFrame(step);
  };
})();
</script>
</body>
</html>
