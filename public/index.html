<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scrum Poker - In-Memory</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        /* Theme variables */
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --card-border: #dee2e6;
            --accent: #0d6efd;
            --accent-2: #0b5ed7;
            --text-color: #111827;
            --card-front-text: #ffffff;
            --muted: rgba(0,0,0,0.6);
            --card-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0b1020;
            --card-bg: #ffffff;
            --card-border: #dee2e6;
            --accent: #4f9cff;
            --accent-2: #2e7bff;
            --text-color: #111827;
            --card-front-text: #ffffff;
            --muted: rgba(230,238,249,0.6);
            --card-shadow: 0 6px 18px rgba(230,238,249,0.6);
        }

        body { background-color: var(--bg); color: var(--text-color); min-height: 100vh; display: flex; align-items: center; }

        /* Playing Card Styling */
        .poker-card { 
            width: 80px; 
            height: 120px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: 2px solid var(--card-border);
            border-radius: 10px;
            position: relative;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
        }

        .poker-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .poker-card.selected { 
            border-color: var(--accent); 
            background-color: var(--accent); 
            color: var(--card-front-text);
            transform: translateY(-10px);
        }

        .card-value { font-size: 1.8rem; font-weight: 800; }

        /* For the hidden player cards */
        .card-back {
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, var(--accent-2) 10px, var(--accent-2) 20px);
            border: 2px solid var(--card-bg);
            height: 40px;
            width: 30px;
            border-radius: 4px;
            display: inline-block;
        }

        .card-container {
            perspective: 1000px;
            width: 40px;
            height: 60px;
        }

        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* This class triggers the flip */
        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back-side {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* The side the user sees when revealed */
        .card-front {
            background-color: var(--accent);
            color: var(--card-front-text);
            font-size: 1.5rem;
        }

        /* The side the user sees while waiting (The "Back" of the card) */
        .card-back-side {
            background: repeating-linear-gradient(45deg, var(--accent), var(--accent) 10px, var(--accent-2) 10px, var(--accent-2) 20px);
            transform: rotateY(180deg);
            border: 3px solid var(--card-bg);
            position: relative; /* Essential for absolute positioning of icons */
            color: rgba(255, 255, 255, 0.9); /* Icon color */
        }

        /* Corner Icon Styling */
        .corner-icon {
            position: absolute;
            font-size: 0.75rem;
        }

        .top-left {
            top: 5px;
            left: 5px;
        }

        .bottom-right {
            bottom: 5px;
            right: 5px;
            transform: rotate(180deg); /* Flip the bottom icon like a real card */
        }

        /* Resetting animation for the deck */
        @keyframes card-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pop { animation: card-pop 0.3s ease-out; }

        #yatzee-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #yatzee-text {
            font-size: 10rem;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 20px #fff, 0 0 30px #ff4da6, 0 0 40px #ff4da6, 0 0 50px #ff4da6, 0 0 60px #ff4da6, 0 0 70px #ff4da6, 0 0 80px #ff4da6;
        }

        #versus-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9998; /* Below yatzee */
            color: white;
            font-family: 'Bangers', cursive;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .versus-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 80%;
            text-align: center;
            transform: skew(-5deg);
        }

        .versus-team {
            width: 40%;
            padding: 2rem;
            border: 5px solid;
            border-radius: 15px;
        }

        #low-voters {
            border-color: #ffc107;
            transform: rotate(-5deg);
        }

        #high-voters {
            border-color: #17a2b8;
            transform: rotate(5deg);
        }

        .versus-vote {
            font-size: 8rem;
            font-weight: bold;
            text-shadow: 4px 4px 0px #000;
            line-height: 1;
        }

        #low-voters .versus-vote {
            color: #ffc107;
        }

        #high-voters .versus-vote {
            color: #17a2b8;
        }

        .versus-players {
            margin-top: 1rem;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
        }

        .versus-separator {
            font-size: 10rem;
            font-weight: bold;
            color: #dc3545; /* Red color */
            text-shadow: 5px 5px 0px #000;
            transform: skew(-10deg) rotate(-10deg);
        }
    </style>
</head>
<body>
    <div id="versus-overlay">
        <div class="versus-container">
            <div class="versus-team" id="low-voters">
                <div class="versus-vote" id="low-vote-value"></div>
                <div class="versus-players" id="low-player-list"></div>
            </div>
            <div class="versus-separator">VS</div>
            <div class="versus-team" id="high-voters">
                <div class="versus-vote" id="high-vote-value"></div>
                <div class="versus-players" id="high-player-list"></div>
            </div>
        </div>
    </div>
    <div id="yatzee-overlay">
        <div id="yatzee-text">Yatzee!</div>
    </div>
    <div class="container">
        <!-- 1. Login/Join Screen -->
        <div id="login" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4 text-center">
                    <h2 class="mb-4">Scrum Poker</h2>
                    <div class="mb-3">
                        <input type="text" id="user" class="form-control form-control-lg" placeholder="Enter your name">
                    </div>
                    <button onclick="join()" class="btn btn-primary btn-lg w-100">Join Session</button>
                    <p class="text-muted mt-3 small">Share this URL with your team to invite them!</p>
                </div>
            </div>
        </div>

        <!-- 2. Game Session -->
        <div id="game" style="display:none">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h3 id="title" class="text-primary mb-0"></h3>
                <div class="d-flex align-items-center" style="gap: .5rem;">
                    <div class="input-group" style="width: auto;">
                        <input type="text" id="shareUrl" class="form-control form-control-sm" readonly>
                        <button class="btn btn-outline-secondary btn-sm" onclick="copyLink()" id="copyBtn">Copy Link</button>
                    </div>
                    <div class="form-check form-switch ms-2" title="Toggle dark mode">
                        <input class="form-check-input" type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    </div>
                </div>
            </div>

            <!-- Voting Deck -->
            <div class="row g-3 justify-content-center mb-5" id="deck"></div>

            <!-- Player Status & Controls -->
            <div class="row">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white font-weight-bold">Participants</div>
                        <div class="list-group list-group-flush" id="players"></div>
                    </div>
                </div>
                <div class="col-md-4 mt-3 mt-md-0">
                    <div class="d-grid gap-3">
                        <button onclick="socket.emit('reveal-votes', currentRoom)" class="btn btn-success btn-lg">Reveal All Cards</button>
                        <button onclick="reset()" class="btn btn-outline-danger">Reset Round</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        let currentRoom = urlParams.get('room') || Math.random().toString(36).substring(2, 9);
        let myVote = null;

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const toggle = document.getElementById('themeToggle');
            toggle.checked = (theme === 'dark');
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        function initTheme() {
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = (prefersDark ? 'dark' : 'light');
            applyTheme(theme);
        }

        if (!urlParams.get('room')) window.history.replaceState({}, '', `?room=${currentRoom}`);
        initTheme();

        function join() {
            const username = document.getElementById('user').value;
            if(!username) return;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('title').innerText = `Room: ${currentRoom}`;
            document.getElementById('shareUrl').value = window.location.href;
            socket.emit('join-room', { roomId: currentRoom, username });
            renderDeck();
        }

        function renderDeck() {
            const points = [1, 2, 3, 5, 8, 13, 21, '?'];
            const deckContainer = document.getElementById('deck');
            deckContainer.className = "d-flex flex-wrap justify-content-center gap-3 mb-5";
            
            deckContainer.innerHTML = points.map(p => `
                <div class="poker-card ${myVote == p ? 'selected shadow-lg' : ''}" onclick="vote('${p}')">
                    <div class="card-value">${p}</div>
                </div>
            `).join('');
        }

        function vote(v) { myVote = v; socket.emit('submit-vote', { roomId: currentRoom, vote: v }); renderDeck(); }
        function reset() { 
            myVote = null;
            socket.emit('reset-room', currentRoom);
        }

        function resetVotes(){
            // Add a quick animation to the deck
            const deck = document.getElementById('deck');
            deck.classList.add('pop');
            setTimeout(() => deck.classList.remove('pop'), 300);
        }

        async function copyLink() {
            await navigator.clipboard.writeText(window.location.href);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Link", 2000);
        }

        socket.on('room-update', room => {
            const playerList = document.getElementById('players');
            
            Object.entries(room.users).forEach(([id, user]) => {
                let playerRow = document.getElementById(`player-${id}`);
                
                // 1. Create the row if it doesn't exist yet
                if (!playerRow) {
                    playerRow = document.createElement('div');
                    playerRow.id = `player-${id}`;
                    playerRow.className = "list-group-item d-flex justify-content-between align-items-center";
                    playerRow.innerHTML = `
                        <span class="fw-bold fs-5 user-name"></span>
                        <div class="card-container">
                            <div class="card-inner is-flipped">
                                <div class="card-front user-vote"></div>
                                <div class="card-back-side">
                                    <!-- Decorative Corners -->
                                    <i class="bi bi-suit-spade-fill corner-icon top-left"></i>
                                    <i class="bi bi-suit-spade-fill corner-icon bottom-right"></i>
                                </div>
                            </div>
                        </div>`;
                    playerList.appendChild(playerRow);
                }

                // 2. Update the name and vote value
                playerRow.querySelector('.user-name').innerText = user.username;
                const voteDisplay = playerRow.querySelector('.user-vote');
                const cardInner = playerRow.querySelector('.card-inner');
                
                if (user.vote) {
                    voteDisplay.innerText = user.vote;
                    cardInner.style.display = "block"; // Show card if they voted
                    
                    // 3. Trigger the Flip: Only remove 'is-flipped' if reveal is true
                    if (room.showVotes) {
                        cardInner.classList.remove('is-flipped');
                    } else {
                        cardInner.classList.add('is-flipped');
                    }
                } else {
                    cardInner.style.display = "none"; // Hide card if no vote
                }
            });

            // 4. Cleanup: Remove players who left the room
            const currentIds = Object.keys(room.users);
            [...playerList.children].forEach(row => {
                const rowId = row.id.replace('player-', '');
                if (!currentIds.includes(rowId)) row.remove();
            });

            // 5. reset the deck animation on room update (like after reset)
            const anyVotes = Object.values(room.users).some(u => u.vote);
            if (!anyVotes) {
                myVote = null;
                resetVotes();
                renderDeck();
            }
        });
    </script>
    <script src="/modules/canvas-confetti"></script>
    <script>
        function triggerConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        socket.on('room-update', room => {
            const playerList = document.getElementById('players');
            
            Object.entries(room.users).forEach(([id, user]) => {
                let playerRow = document.getElementById(`player-${id}`);
                
                // 1. Create the row if it doesn't exist yet
                if (!playerRow) {
                    playerRow = document.createElement('div');
                    playerRow.id = `player-${id}`;
                    playerRow.className = "list-group-item d-flex justify-content-between align-items-center";
                    playerRow.innerHTML = `
                        <span class="fw-bold fs-5 user-name"></span>
                        <div class="card-container">
                            <div class="card-inner is-flipped">
                                <div class="card-front user-vote"></div>
                                <div class="card-back-side">
                                    <!-- Decorative Corners -->
                                    <i class="bi bi-suit-spade-fill corner-icon top-left"></i>
                                    <i class="bi bi-suit-spade-fill corner-icon bottom-right"></i>
                                </div>
                            </div>
                        </div>`;
                    playerList.appendChild(playerRow);
                }

                // 2. Update the name and vote value
                playerRow.querySelector('.user-name').innerText = user.username;
                const voteDisplay = playerRow.querySelector('.user-vote');
                const cardInner = playerRow.querySelector('.card-inner');
                
                if (user.vote) {
                    voteDisplay.innerText = user.vote;
                    cardInner.style.display = "block"; // Show card if they voted
                    
                    // 3. Trigger the Flip: Only remove 'is-flipped' if reveal is true
                    if (room.showVotes) {
                        cardInner.classList.remove('is-flipped');
                    } else {
                        cardInner.classList.add('is-flipped');
                    }
                } else {
                    cardInner.style.display = "none"; // Hide card if no vote
                }
            });

            // 4. Cleanup: Remove players who left the room
            const currentIds = Object.keys(room.users);
            [...playerList.children].forEach(row => {
                const rowId = row.id.replace('player-', '');
                if (!currentIds.includes(rowId)) row.remove();
            });

            // 5. reset the deck animation on room update (like after reset)
            const anyVotes = Object.values(room.users).some(u => u.vote);
            if (!anyVotes) {
                myVote = null;
                resetVotes();
                renderDeck();
            }

            // 6. Check for Yatzee
            if (room.showVotes) {
                const votes = Object.values(room.users).map(u => u.vote).filter(v => v !== null);
                const allVotesAreTheSame = votes.length > 1 && votes.every(v => v === votes[0]);
                if (allVotesAreTheSame) {
                    const yatzeeOverlay = document.getElementById('yatzee-overlay');
                    yatzeeOverlay.style.display = 'flex';
                    triggerConfetti();
                    setTimeout(() => {
                        yatzeeOverlay.style.display = 'none';
                    }, 4000);
                } else {
                    // 7. Check for large discrepancies
                    const numericVotes = Object.values(room.users)
                        .map(u => u.vote)
                        .filter(v => v !== null && v !== '?')
                        .map(v => parseInt(v));

                    if (numericVotes.length > 1) {
                        const voteSet = [...new Set(numericVotes)].sort((a, b) => a - b);
                        const minVote = voteSet[0];
                        const maxVote = voteSet[voteSet.length - 1];
                        
                        const points = [1, 2, 3, 5, 8, 13, 21];
                        const minIndex = points.indexOf(minVote);
                        const maxIndex = points.indexOf(maxVote);

                        if (maxIndex > minIndex + 1) {
                            const lowVoters = Object.values(room.users).filter(u => parseInt(u.vote) === minVote).map(u => u.username).join(', ');
                            const highVoters = Object.values(room.users).filter(u => parseInt(u.vote) === maxVote).map(u => u.username).join(', ');

                            document.getElementById('low-vote-value').innerText = minVote;
                            document.getElementById('high-vote-value').innerText = maxVote;
                            document.getElementById('low-player-list').innerText = lowVoters;
                            document.getElementById('high-player-list').innerText = highVoters;

                            const versusOverlay = document.getElementById('versus-overlay');
                            versusOverlay.style.display = 'flex';
                            setTimeout(() => {
                                versusOverlay.style.display = 'none';
                            }, 5000);
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
